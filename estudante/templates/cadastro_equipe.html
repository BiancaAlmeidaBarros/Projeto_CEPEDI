<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <h1> Cadastrar equipe </h1>
    {% if quantidade == 0 %}
    <form action="{% url 'cadastro_equipe' %}" method="get">{% csrf_token %}
        <p>qual a quantidade de funcionarios <input type="number" name="quantidade" id="quantidade"></p>
        <input type="submit" value="confirmar">
    </form>
    {% elif quantidade > 0 %}
    <form action="{% url 'cadastro_equipe' %}" method="post">{% csrf_token %}
        <p>matricula do estudante <input type="number" name="matricula" id="matricula"></p>
        {% for i in lista %}
        <p>cpf do funcionario <input type="number" name="cpf_{{i}}" id="cpf_{{i}}"></p>
        {% endfor %}
        <input type="hidden" name="quantidade" value="{{quantidade}}">
        <input type="submit" value="cadastrar">
    </form>
    {% endif %}
</body>
</html>
