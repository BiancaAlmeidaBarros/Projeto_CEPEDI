<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Document</title>
</head>
<body>
    <h1>remover professor</h1>
    <form action="{% url 'remover_professor' %}" method="post">{% csrf_token %}
        <label>
            matricula
            <input type="text" name="matricula" id="matricula" list="professor">
        </label>
        <datalist id="professor">
            {% for professor in professores %}
            <option value="{{professor.matricula}}">{{professor.nome}}</option>
            {% endfor %}
        </datalist>
        <input type="submit" value="confirmar">
    </form>
</body>
</html>
